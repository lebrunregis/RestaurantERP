<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #fefefe;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        ul {
            list-style: none;
            padding: 0;
            max-width: 800px;
            margin: auto;
        }
        li {
            margin: 15px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: box-shadow 0.2s;
        }
        li:hover {
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        a {
            text-decoration: none;
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.3em;
        }
        p {
            margin-top: 5px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Recipe List</h1>
    <ul>
        {% for recipe in recipes %}
        <li>
            <a href="{{ url_for('recipe_detail', recipe_id=recipe.recipe_id) }}">
                {{ recipe.name }}
            </a>
            {% if recipe.description %}
            <p>{{ recipe.description[:100] }}{% if recipe.description|length > 100 %}...{% endif %}</p>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</body>
</html>
